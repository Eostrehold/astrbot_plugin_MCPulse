<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Inter, sans-serif;
    background: #f6f5f4;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 32px;
}
.card {
    width: 100%;
    max-width: 520px;
    border: 1px solid #e5e3df;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
}
.card-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 24px;
    border-bottom: 1px solid #f0eeec;
}
.icon-box {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    background: #5645d4; color: #fff; font-weight: 700; font-size: 20px;
}
.header-info { flex: 1; }
.title { font-size: 17px; font-weight: 600; color: #1a1a1a; }
.subtitle { font-size: 12px; color: #787671; margin-top: 2px; }
.body-card { padding: 20px 24px; }
.stat-row {
    border: 1px solid #e5e3df; border-radius: 8px; padding: 12px 16px;
    margin-bottom: 10px; background: #f6f5f4;
}
.stat-row-label { font-size: 10px; font-weight: 700; color: #bbb8b1; }
.stat-row-main { font-size: 16px; font-weight: 700; color: #1a1a1a; margin-top: 4px; }
.stat-row-sub { font-size: 11px; color: #5d5b54; float: right; margin-top: -18px; }
.rate-row { border-radius: 8px; padding: 12px 16px; margin-bottom: 10px; }
.rate-row.good { background: #d9f3e1; border: 1px solid #c5e8d0; }
.rate-row.ok { background: #fef7d6; border: 1px solid #f5eeb0; }
.rate-row.bad { background: #fde0ec; border: 1px solid #f5d0df; }
.rate-value { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-top: 4px; }
.rate-sub { font-size: 11px; color: #5d5b54; float: right; margin-top: -20px; }
.footer {
    padding: 12px 24px; border-top: 1px solid #f0eeec;
    font-size: 11px; color: #bbb8b1; text-align: right;
}
</style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <div class="icon-box">{{ initial }}</div>
        <div class="header-info">
            <div class="title">{{ server_name }} - 统计</div>
            <div class="subtitle">最近 {{ days }} 天 · {{ total_checks }} 次检测</div>
        </div>
    </div>
    <div class="body-card">
        <div class="stat-row">
            <div class="stat-row-label">延迟</div>
            <div class="stat-row-main">{{ avg_latency }} ms 平均</div>
            <div class="stat-row-sub">最低 {{ min_latency }}  最高 {{ max_latency }}</div>
        </div>
        <div class="stat-row">
            <div class="stat-row-label">人数</div>
            <div class="stat-row-main">{{ avg_players }} 平均</div>
            <div class="stat-row-sub">峰值 {{ max_players }}</div>
        </div>
        <div class="rate-row {{ rate_class }}">
            <div class="stat-row-label">在线率</div>
            <div class="rate-value">{{ online_rate }}%</div>
            <div class="rate-sub">{{ online_count }} 次在线 / {{ total_checks }} 次检测</div>
        </div>
    </div>
    <div class="footer">MCPulse · {{ queried_at }}</div>
</div>
</body>
</html>
